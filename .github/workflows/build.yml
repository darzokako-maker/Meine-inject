name: Windows EXE ve DLL Derleyici

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: MSVC (C++) Kurulumu
        uses: ilammy/msvc-dev-cmd@v1

      - name: Dosyaları Derle
        run: |
          cl.exe /EHsc main.cpp /link user32.lib /out:Injector.exe
          cl.exe /LD cheat.cpp /link user32.lib /out:cheat.dll

      - name: Paketleme Kontrolü
        run: |
          mkdir hile_paketi
          if (Test-Path "Injector.exe") { move Injector.exe hile_paketi\ }
          if (Test-Path "cheat.dll") { move cheat.dll hile_paketi\ }

      - name: Paketi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Hile-Seti
          path: hile_paketi/
          
