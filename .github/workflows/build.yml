name: Manual Mapper Pro Derleyici

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: MSVC (C++) Kurulumu
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64 # 64-bit sistemler için zorunlu (Notepad, Oyunlar vb.)

      - name: Manuel Mapper ve DLL Derle
        # /O2: En iyi hız optimizasyonu
        # /std:c++17: Modern kütüphane desteği
        # /MT: Kütüphaneleri EXE içine gömer (başka PC'de DLL hatası vermez)
        run: |
          cl.exe /EHsc /O2 /std:c++17 /MT main.cpp /link user32.lib /out:Injector.exe
          cl.exe /LD /O2 /std:c++17 /MT cheat.cpp /link user32.lib /out:cheat.dll

      - name: Hile Paketini Hazırla
        run: |
          mkdir Pro-Set
          if (Test-Path "Injector.exe") { move Injector.exe Pro-Set\ }
          if (Test-Path "cheat.dll") { move cheat.dll Pro-Set\ }

      - name: Paketi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Manual-Mapper-V2
          path: Pro-Set/
          
