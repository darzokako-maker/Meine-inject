name: Windows EXE ve DLL Derleyici

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: MSVC (Visual Studio Derleyicisi) Kur
        uses: ilammy/msvc-dev-cmd@v1

      - name: Injector Derle
        run: cl.exe /EHsc main.cpp /fe:Injector.exe

      - name: DLL Derle
        run: cl.exe /LD cheat.cpp /fe:cheat.dll

      - name: Dosyaları Paketle
        uses: actions/upload-artifact@v4
        with:
          name: Derlenmis-Hile-Seti
          path: |
            Injector.exe
            cheat.dll
            
