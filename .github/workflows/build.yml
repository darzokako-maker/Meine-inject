name: Manual Mapper Pro Derleyici

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: MSVC (C++) Kurulumu
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Injector ve DLL Derle
        shell: cmd
        run: |
          :: Injector Derleme (Standart EXE)
          cl.exe /EHsc /O2 /std:c++17 /MT main.cpp /link user32.lib advapi32.lib /out:Injector.exe
          
          :: DLL Derleme (Kritik: /DYNAMICBASE ve /FIXED:NO eklenmeli ki Relocation tablosu oluşsun)
          cl.exe /LD /O2 /std:c++17 /MT cheat.cpp /link /DYNAMICBASE /FIXED:NO user32.lib gdi32.lib advapi32.lib /out:cheat.dll

      - name: Dosyaları Hazırla ve Doğrula
        shell: cmd
        run: |
          if not exist Pro-Set mkdir Pro-Set
          copy Injector.exe Pro-Set\
          copy cheat.dll Pro-Set\
          dir Pro-Set

      - name: Paketi Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Hile-Paketi-Tam
          path: Pro-Set/
          
