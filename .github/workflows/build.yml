name: CS2-Stealth-Build

on: 
  push:
    branches: [ "main" ] # Kodunu main branch'ine attığında çalışır
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Manuel olarak da başlatabilmen için

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.2.0

    - name: Restore NuGet Packages
      run: nuget restore YourSolutionName.sln # .sln dosyanın adıyla değiştir

    - name: Build Solution (x64 Release)
      run: |
        msbuild YourSolutionName.sln `
        /p:Configuration=Release `
        /p:Platform=x64 `
        /p:CharacterSet=MultiByte `
        /p:PlatformToolset=v143 # VS 2022 kullanır

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CS2-Stealth-Package
        path: |
          x64/Release/YourInjectorName.exe
          x64/Release/YourDllName.dll
          
